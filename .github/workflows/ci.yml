name: CI - Tree Inspector

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    # Serviço de Banco de Dados para os testes
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5433:5432
        # Healthcheck para garantir que o banco subiu antes de rodar os testes
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    # 1. Rodar Testes Unitários e Integração (Jest)
    # Definimos a variável de ambiente aqui para apontar para o serviço do banco
    - name: Run Jest Tests (Unit & Integration)
      env:
        # No GitHub Actions, 'localhost' acessa os serviços mapeados
        POSTGRES_URL: postgresql://test_user:test_password@localhost:5433/test_db
        NEXTAUTH_SECRET: "segredo-de-teste-ci"
        NEXTAUTH_URL: "http://localhost:3000"
      run: npm test

    # 2. Rodar Testes E2E (Playwright)
    # O Playwright vai subir o servidor web (npm run dev) internamente
    - name: Run Playwright Tests (E2E)
      env:
        # Mesma conexão de banco para o servidor que o Playwright vai subir
        POSTGRES_URL: postgresql://test_user:test_password@localhost:5433/test_db
        NEXTAUTH_SECRET: "segredo-de-teste-ci"
        NEXTAUTH_URL: "http://localhost:3000"
        CI: true
      run: npx playwright test

    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30