name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    # +++ INÍCIO DO BLOCO DE SERVIÇOS (Copiado de ci.yml) +++
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    # +++ FIM DO BLOCO DE SERVIÇOS +++

    steps:
    - uses: actions/checkout@v4
    # ... (o restante das suas etapas) ...
    - name: Install dependencies
      # Use a flag --legacy-peer-deps para evitar o erro de ERESOLVE
      run: npm install --legacy-peer-deps  
      # -----------------------------------------------------
    - name: Wait for DB and Setup Schema
      # Este comando executa o script que limpa e cria a tabela 'users'
      # Ele já está definido no seu package.json: "setup:db:test"
      run: npm run setup:db:test
      # As variáveis de ambiente garantem que o script se conecte à porta 5433
      env:
        POSTGRES_URL: postgresql://test_user:test_password@localhost:5433/test_db
        # Necessário se o script de setup for em TS e usar ts-node
        NODE_OPTIONS: --loader ts-node/esm
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    # O Playwright já inicia o servidor web (webServer) com a conexão correta
    - name: Run Playwright tests
      run: npx playwright test
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
